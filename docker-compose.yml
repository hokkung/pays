services:
  # already has 
  # postgres:
  #   image: postgres:16-alpine
  #   environment:
  #     POSTGRES_USER: pays
  #     POSTGRES_PASSWORD: pays
  #     POSTGRES_DB: pays
  #   ports:
  #     - "5432:5432"
  #   volumes:
  #     - pgdata:/var/lib/postgresql/data
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U pays"]
  #     interval: 5s
  #     timeout: 3s
  #     retries: 5

  api:
    build: ./backend
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@host.docker.internal:5432/pays
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "uv run alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"

  worker:
    build: ./backend
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@host.docker.internal:5432/pays
    depends_on:
      postgres:
        condition: service_healthy
    command: ["uv", "run", "pays", "jobs", "scheduler"]

volumes:
  pgdata:
